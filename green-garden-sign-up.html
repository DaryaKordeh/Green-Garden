<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good Morning Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: url('/photo/0-1-9.jpg') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .container {
      width: 800px;
      height: 450px;
      background: linear-gradient(to top right, #e0f7ff, #ffffff);
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: flex;
      position: relative;
      padding: 40px;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 30px;
    }

    .left h2{
      font-size: 30px;
      font-weight: 600;
      color: #065e03e7;
    }

    .left p {
      font-size: 16px;
      margin-top: 10px;
      color: #666;
    }

    .login-box {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      background: rgba(41, 133, 41, 0.233);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      color: #075707;
    }

    .login-box h2 {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 10px;
      background: rgba(68, 161, 45, 0.233);
      color: #0d910d;
      font-size: 14px;
    }

    .login-box input::placeholder {
      color: #554b4b;
    }

    .remember {
      display: flex;
      align-items: center;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .remember input {
      margin-left: 8px;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #24bb06;
      border: none;
      border-radius: 10px;
      color: #f0f0f0;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-box button:hover {
      background: #52d60681;
      color: #000;
    }

    .login-box .links {
      margin-top: 15px;
      font-size: 13px;
      text-align: center;
    }

    .login-box .links a {
      color: #27dd03;
      text-decoration: none;
      margin: 0 5px;
    }

    .login-box .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h2>
      با تیم مجرب گرین گاردن در ارتباط باشید</h2>
      <p></p>
    </div>
    <div class="login-box">
      <h2>نام کاربری </h2>
      <input type="text" placeholder="@نام کاربری" />
      <h2>رمز عبور</h2>
      <input type="password" placeholder="••••••••" />
      
      <button>ورود</button>
      <div class="links">
        <p>حساب کاربری دارم! <a href="#"></a></p>
        <a href="#">فراموشی رمز عبور?</a>
      </div>
    </div>
  </div>
</body>
</html>
